name: 🤖 Daily AI Project Generator

on:
  schedule:
    # Har kuni soat 09:00 UTC (Toshkent 14:00) da ishga tushadi
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Qo'lda ham ishga tushirish mumkin

jobs:
  generate-project:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Kodni yuklab olish
        uses: actions/checkout@v4

      - name: 🐍 Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Kerakli kutubxonalarni o'rnatish
        run: pip install requests

      - name: 🚀 AI Agent ishga tushirish
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MY_GH_TOKEN: ${{ secrets.MY_GH_TOKEN }}
        run: python agent.py
